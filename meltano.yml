send_anonymous_usage_stats: true
project_id: tap-weatherapi
default_environment: test
requires_meltano: '>=4.0'
environments:
- name: test
plugins:
  extractors:
  - name: tap-weatherapi
    namespace: tap_weatherapi
    pip_url: requests-cache -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    settings_group_validation:
    - [api_key, locations, start_date]
    - [api_key, locations_file, start_date]

    settings:
    - name: api_key
      kind: string
      label: API Key
      description: WeatherAPI key (https://www.weatherapi.com/my/)
      sensitive: true

    - name: locations
      kind: array
      label: Locations
      description: >
        One or more locations to fetch weather data for.
        Accepts city names, US zip codes, UK/Canada postcodes, lat/lon pairs, airport codes,
        IP addresses, and Search API IDs.
        See https://www.weatherapi.com/docs/#intro-request for full syntax.
        Use `locations_file` instead when syncing many locations.

    - name: locations_file
      kind: string
      label: Locations File
      description: >
        Path to a JSON file listing locations to sync.
        Format: [{"location": "90210", "custom_id": "beverly-hills"}, ...].
        `location` accepts the same values as the `locations` setting.
        `custom_id` is optional; when provided it is passed through to each record
        and used to correlate bulk-request responses with the original query.

    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: Earliest date for historical data sync (YYYY-MM-DD).

    - name: end_date
      kind: date_iso8601
      label: End Date
      description: Latest date for historical data sync, in ISO format. Defaults to yesterday's date.

    - name: forecast_days
      kind: integer
      value: 5

      label: Forecast Days
      description: Number of days to include in the forecast stream (1–14).

    - name: use_bulk_requests
      kind: boolean
      value: false
      label: Use Bulk Requests
      description: >
        Send all locations in a single POST request instead of one GET request per location.
        Requires a WeatherAPI Pro+, Business, or Enterprise plan.
        Maximum 50 locations per request.
        Each location in a bulk request still counts as one API call.
        See https://www.weatherapi.com/docs/#intro-bulk.

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-duckdb
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/target-duckdb.git
